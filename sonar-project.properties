sonar.projectKey=tedeuxx_tadeumendonca-api
sonar.organization=tedeuxx

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts

# Operational scripts (build/deploy/seed) and type-only/wiring files do I/O + AWS — excluded from the
# coverage metric (the application logic in src/modules + src/shared is unit-tested to ≥85%).
sonar.coverage.exclusions=scripts/**,src/index.ts,src/shared/db/client.ts,src/shared/s3/client.ts,src/modules/og-image/generator.ts,src/shared/types/**,src/shared/config/**,**/*.test.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info
