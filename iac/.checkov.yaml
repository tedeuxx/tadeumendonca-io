# Checkov config — consumed by terraform-plan.yml (hard-fail gate).
# Global skips are deliberate, project-wide policy deviations (resource-specific suppressions go
# inline as #checkov:skip=<ID>:<reason> on the resource, e.g. CKV_AWS_120 on the API GW stage).
directory:
  - terraform/
framework:
  - terraform
compact: true
skip-check:
  # We pin module sources by version tag (~>), not commit hash — the standard set by
  # /infrastructure/terraform. CKV_TF_2 ("use a tag with a version number") enforces our policy
  # and PASSES; CKV_TF_1 ("use a commit hash") is the conflicting alternative — skip it.
  - CKV_TF_1
  # SSM parameters are String only (never SecureString) by policy — the config bus holds only
  # non-sensitive names/ids/ARNs; runtime secrets live in Secrets Manager (/infrastructure/ssm).
  # CKV2_AWS_34 ("SSM Parameter should be Encrypted") conflicts with that — skip it.
  - CKV2_AWS_34
  # CloudWatch log groups use the AWS-managed key by default; CKV_AWS_158 ("encrypted by KMS [CMK]")
  # demands a customer-managed CMK — Phase 1-3 is no-CMK by policy (/infrastructure/kms).
  - CKV_AWS_158
  # Log retention is a deliberate cost choice: 30d staging / 90d production across our log groups
  # (WAF, API GW). CKV_AWS_338 demands >= 1 year — skip; audit history lives in DynamoDB, not logs.
  - CKV_AWS_338
  # The BFF Lambda is deliberately NON-VPC (no NAT — cost): it reaches DynamoDB/S3/SES/Cognito over
  # public AWS endpoints with IAM. CKV_AWS_117 ("Lambda inside a VPC") conflicts — skip until an
  # in-VPC dependency (Redis) is reintroduced (api.tf).
  - CKV_AWS_117
