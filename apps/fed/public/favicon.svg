<!-- Brand mark — "T-block": a solid safety-orange field with a heavy near-black T (Tadeu).
     Built from rects only (no font dependency) so it renders identically everywhere, radius 0, flat —
     the brutalist identity. Sized for 16px legibility: one bold glyph, maximum contrast. The orange
     field is deliberate: it pops on both light and dark tab strips, where a near-black tile disappears.
     The same mark is the apple-touch-icon (scripts/gen-icons.mjs) and the badge on the OG card. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="tadeumendonca.io">
  <rect width="512" height="512" fill="#FF5A00"/>
  <g fill="#0A0A0A">
    <rect x="112" y="140" width="288" height="72"/>
    <rect x="220" y="140" width="72" height="232"/>
  </g>
</svg>
