sonar.projectKey=tedeuxx_tadeumendonca-io
sonar.projectName=tadeumendonca-io
sonar.organization=tedeuxx

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx

# Bootstrap/provider/router wiring + build-time config + type-only files do no logic or are
# exercised by Playwright e2e (not unit) — excluded from the coverage metric (component/unit logic
# in src is unit-tested to ≥85%). Mirrors the vitest coverage.exclude in vitest.config.ts.
sonar.coverage.exclusions=src/main.tsx,src/App.tsx,src/auth/amplify.ts,src/pages/CallbackPage.tsx,src/env.ts,src/test-setup.ts,src/types/**,src/vite-env.d.ts,**/*.test.ts,**/*.test.tsx
sonar.javascript.lcov.reportPaths=coverage/lcov.info
