# Dependency hygiene (ADR-0021). The continuous half of the package-vulnerability floor: scheduled
# update PRs + GitHub-native vulnerability alerts / security-update PRs. The *enforcement* half — a
# blocking gate that fails a PR on a high/critical prod advisory — lives in build-test.yml (audit-ci).
#
# NOTE (owner, repo Settings): Dependabot *version* updates are governed by this file, but the
# *vulnerability alerts* / security-update half is a repo toggle (Settings → Code security →
# Dependabot alerts + security updates). Enable it there — the workflow file cannot set it.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/apps/fed"
    schedule:
      interval: "weekly"
    # Keep update-PR noise low: fold minor + patch bumps into a single grouped PR.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Majors are a deliberate manual upgrade, not an auto-PR: a dev-tooling major often needs coordinated
    # peer bumps + testing (e.g. vite 8 needs a newer @vitejs/plugin-react + vitest, and its lockfile fails
    # `npm ci` until they move together). So Dependabot auto-proposes only minor/patch here. This governs
    # scheduled VERSION updates only — security fixes still surface via Dependabot alerts, and the audit-ci
    # gate (build-test.yml) still blocks a shipped high/critical prod vulnerability regardless.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 5
