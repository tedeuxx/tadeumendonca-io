name: lint-workflows

# The gate that did not exist. `build-test` is path-filtered to apps/fed, so a change to
# .github/workflows/** matched nothing and still reported PASS — a green check that verified
# nothing, indistinguishable from one that verified everything. That is how an unexecuted retry
# loop reached the production release path (issue #79), and it is why `actionlint` was in the
# permission allowlist while being wired into no job at all.
#
# actionlint also runs shellcheck over inline `run:` blocks, which is where the real logic lives —
# version-main.yml's retry loop, the release-notes generator. One tool covers both gaps.

on:
  pull_request:
    paths:
      - ".github/workflows/**"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"

permissions:
  contents: read

concurrency:
  group: lint-workflows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pinned by CHECKSUM, not just by version: a tag can be moved, a release asset can be
      # replaced. This job reads every workflow in the repo, so its own supply chain is worth the
      # extra line — and #73 is about to pin the actions here for the same reason.
      - name: Install actionlint (pinned)
        env:
          ACTIONLINT_VERSION: 1.7.12
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          set -euo pipefail
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -sSfL -o actionlint.tar.gz "$url"
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum --check --strict
          tar -xzf actionlint.tar.gz actionlint

      # shellcheck is preinstalled on ubuntu-latest; actionlint shells out to it for `run:` blocks.
      - name: Lint every workflow
        run: ./actionlint -color

      # A path-filtered job that matched nothing is the failure this workflow exists to prevent, so
      # this one says out loud what it checked rather than leaving a bare green tick to interpret.
      - name: Report what was linted
        run: |
          set -euo pipefail
          count=$(find .github/workflows -name '*.yml' -o -name '*.yaml' | wc -l | tr -d ' ')
          echo "::notice::actionlint passed over ${count} workflow file(s)"
