name: version-main

# On merge to main (trunk-based): auto-bump the patch version, tag, and publish a GitHub Release.
# Numeric SemVer. Uses VERSION_BUMP_TOKEN so the bump commit does not retrigger CI in a loop.

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: version-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the commit that the bump itself produced.
    if: ${{ !startsWith(github.event.head_commit.message, 'bump:') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.VERSION_BUMP_TOKEN }}
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bump-my-version
        run: pip install bump-my-version

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Rebase onto whatever landed while this job was starting. `concurrency` serializes RUNS, but it
      # cannot stop main moving between this job's checkout and its push — two merges seconds apart is
      # enough, and that is exactly what happened on 2026-07-23.
      - name: Bump patch version and push, rebasing if main moved
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            git fetch origin main
            git reset --hard origin/main          # re-read VERSION from the real tip, not a stale one
            bump-my-version bump patch --verbose
            # --atomic is the load-bearing flag. Without it a push is NOT all-or-nothing: on
            # 2026-07-23 the branch was rejected (non-fast-forward) while the TAG went through,
            # leaving v0.1.39 pointing at a commit that never reached main. Every later run then
            # died on "tag already exists" — a self-perpetuating break across four merges.
            if git push --atomic origin main --follow-tags; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "push rejected (main moved); dropping the local bump and retrying"
            git tag -d "v$(cat VERSION)"          # local only — --atomic guarantees it never shipped
          done
          echo "::error::could not push the version bump after 3 attempts"
          exit 1

      - name: Read new version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Build categorized release notes (commits since the previous release)
        env:
          GH_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
        run: |
          NEW="v${{ steps.version.outputs.version }}"
          # previous *release* — only main publishes Releases, so this skips the per-commit
          # develop tags (v0.1.x). The new release isn't created yet, so exclude NEW defensively.
          PREV=$(gh release list --exclude-drafts --json tagName \
            --jq "[.[].tagName | select(. != \"$NEW\")] | .[0]" 2>/dev/null || true)
          RANGE="${PREV:+$PREV..}$NEW"
          log() { git log --no-merges --pretty='%s%x09%h' "$RANGE" | grep -v '^bump:'; }
          section() {  # $1 = heading, $2 = alternation of conventional-commit types
            body=$(log | grep -iE "^($2)(\(.+\))?!?:" \
              | sed -E "s/^($2)(\([^)]*\))?!?:[[:space:]]*//I" \
              | awk -F'\t' '{print "- " $1 " (" $2 ")"}')
            if [ -n "$body" ]; then printf '### %s\n%s\n\n' "$1" "$body"; fi
          }
          {
            section "✨ Features" "feat|feature"
            section "🐛 Fixes" "fix"
            section "📝 Documentation" "docs"
            section "♻️ Refactoring" "refactor"
            section "⚙️ CI & chores" "ci|chore|build|test"
            other=$(log | grep -ivE "^(feat|feature|fix|docs|refactor|ci|chore|build|test|style|perf)(\(.+\))?!?:" \
              | awk -F'\t' '{print "- " $1 " (" $2 ")"}')
            if [ -n "$other" ]; then printf '### Other\n%s\n\n' "$other"; fi
            if [ -n "$PREV" ]; then echo "**Full changelog**: https://github.com/${{ github.repository }}/compare/$PREV...$NEW"; fi
          } > RELEASE_NOTES.md
          echo "Generated notes for $RANGE:"; cat RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file RELEASE_NOTES.md
