name: fed-deploy

# Build the SPA (Vite, env injected at build time) and publish: S3 sync with split cache headers
# (immutable hashed assets vs no-cache index.html) + CloudFront invalidation.
# develop → staging (auto); main → production (Environment-gated). AWS via OIDC (AWS_FED_OIDC_ROLE_ARN =
# the fed deploy role; OIDC trust repo:org/tadeumendonca-pwa:*). Monorepo Stage A: steps run in apps/fed.
#
# Regression policy (owner, 2026-06-16): post-deploy E2E (Playwright) runs ONLY on main (production),
# NOT on develop/staging.
on:
  push:
    branches: [develop, main]
    paths:
      - "apps/fed/**"
      - "packages/shared/**"
      - ".github/workflows/fed-deploy.yml"

permissions:
  id-token: write # OIDC → AWS
  contents: read

concurrency:
  group: fed-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AWS_REGION: us-east-1

jobs:
  deploy:
    if: ${{ !startsWith(github.event.head_commit.message, 'bump:') }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    defaults:
      run:
        working-directory: apps/fed
    env:
      ENV_NAME: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/fed/package-lock.json

      - name: Install
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_FED_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve config from SSM
        id: cfg
        run: |
          ssm() { aws ssm get-parameter --name "$1" --query 'Parameter.Value' --output text; }
          {
            echo "bucket=$(ssm /$ENV_NAME/frontend/s3-bucket-name)"
            echo "distribution_id=$(ssm /$ENV_NAME/frontend/cloudfront-distribution-id)"
            echo "api_base_url=$(ssm /$ENV_NAME/api/gateway-url)"
            echo "cognito_pool_id=$(ssm /$ENV_NAME/auth/cognito-user-pool-id)"
            echo "cognito_client_id=$(ssm /$ENV_NAME/auth/cognito-client-id)"
            echo "cognito_domain=$(ssm /$ENV_NAME/auth/cognito-domain)"
          } >> "$GITHUB_OUTPUT"

      - name: Build (Vite — env injected)
        env:
          VITE_API_BASE_URL: ${{ steps.cfg.outputs.api_base_url }}
          VITE_COGNITO_USER_POOL_ID: ${{ steps.cfg.outputs.cognito_pool_id }}
          VITE_COGNITO_CLIENT_ID: ${{ steps.cfg.outputs.cognito_client_id }}
          VITE_COGNITO_DOMAIN: ${{ steps.cfg.outputs.cognito_domain }}
        run: npm run build

      - name: Publish to S3 (split cache headers)
        run: |
          # Immutable hashed assets first; then the revalidating root (index.html, sw.js, manifest, icons)
          # with --delete to prune stale files (assets/ excluded — the first pass owns it).
          aws s3 sync dist/assets/ "s3://${{ steps.cfg.outputs.bucket }}/assets/" \
            --delete --cache-control "public,max-age=31536000,immutable"
          aws s3 sync dist/ "s3://${{ steps.cfg.outputs.bucket }}/" \
            --delete --exclude "assets/*" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.cfg.outputs.distribution_id }}" \
            --paths "/*" >/dev/null
          echo "deployed fed to $ENV_NAME"

      # Post-deploy regression (Playwright E2E) — MAIN/production ONLY (owner policy). Public journeys;
      # config retries absorb CloudFront invalidation lag.
      - name: E2E smoke (Playwright) against production
        if: github.ref == 'refs/heads/main'
        env:
          E2E_ENV: ${{ env.ENV_NAME }}
        run: |
          npx playwright install --with-deps chromium
          sleep 10 # let the CloudFront invalidation propagate before driving the browser
          npm run e2e
