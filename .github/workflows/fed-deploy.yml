name: fed-deploy

# Build the SPA (Vite, static — prerendered) and publish: S3 sync with split cache headers (immutable
# hashed assets vs no-cache index.html) + CloudFront invalidation. Trunk-based: merge to main → deploy
# to the single environment (auto). AWS via OIDC (AWS_FED_OIDC_ROLE_ARN = the fed deploy role; the
# trust pins the IMMUTABLE subject repo:<org>@<org_id>/<repo>@<repo_id>:* — see iac/iam.tf, and note
# that a repo rename does not change it). Post-deploy E2E (Playwright) runs on the trunk.
on:
  push:
    branches: [main]
    paths:
      - "apps/fed/**"
      - "packages/shared/**"
      - ".github/workflows/fed-deploy.yml"
  workflow_dispatch:

permissions:
  id-token: write # OIDC → AWS
  contents: read

concurrency:
  group: fed-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AWS_REGION: us-east-1

jobs:
  deploy:
    if: ${{ !startsWith(github.event.head_commit.message, 'bump:') }}
    runs-on: ubuntu-latest
    environment: staging
    defaults:
      run:
        working-directory: apps/fed
    env:
      ENV_NAME: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/fed/package-lock.json

      - name: Install
        run: npm ci

      - name: Install Playwright browser (for the prerender step)
        run: npx playwright install --with-deps chromium

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_FED_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve config from SSM
        id: cfg
        run: |
          ssm() { aws ssm get-parameter --name "$1" --query 'Parameter.Value' --output text; }
          {
            echo "bucket=$(ssm /$ENV_NAME/frontend/s3-bucket-name)"
            echo "distribution_id=$(ssm /$ENV_NAME/frontend/cloudfront-distribution-id)"
          } >> "$GITHUB_OUTPUT"

      - name: Build (static — prerendered)
        run: npm run build:static

      - name: Publish to S3 (split cache headers)
        run: |
          # Immutable hashed assets first; then the revalidating root (index.html, prerendered routes, icons)
          # with --delete to prune stale files (assets/ excluded — the first pass owns it).
          aws s3 sync dist/assets/ "s3://${{ steps.cfg.outputs.bucket }}/assets/" \
            --delete --cache-control "public,max-age=31536000,immutable"
          aws s3 sync dist/ "s3://${{ steps.cfg.outputs.bucket }}/" \
            --delete --exclude "assets/*" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: CloudFront invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.cfg.outputs.distribution_id }}" \
            --paths "/*" >/dev/null
          echo "deployed fed to $ENV_NAME"

      # Post-deploy SMOKE (Playwright E2E) against the real apex. The full regression already gated the
      # PR (fed-ci, against a preview) — this is the post-deploy health confirmation the principles ask
      # for: it exercises the real CDN + prerendered HTML and catches deploy/CloudFront-level breakage
      # the pre-merge run can't see. Config retries absorb invalidation lag.
      - name: E2E smoke (Playwright) against production
        if: github.ref == 'refs/heads/main'
        env:
          E2E_ENV: ${{ env.ENV_NAME }}
        run: |
          npx playwright install --with-deps chromium
          sleep 10 # let the CloudFront invalidation propagate before driving the browser
          npm run e2e
