name: infra-apply

# Apply on merge to main → the single (staging) workspace (auto, no gate). TFC holds state (Local
# execution — GitHub runs apply); AWS via OIDC. On apply, this writes the app SSM params
# (/{env}/{frontend,storage,iam}/*) that fed-deploy reads.
on:
  push:
    branches: [main]
    paths:
      - "iac/**"
      - ".github/workflows/infra-apply.yml"
  # Manual trigger for cutovers / re-applies after out-of-band remediation (e.g. Lambda@Edge replica drain).
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC → AWS

env:
  TF_TOKEN_app_terraform_io: ${{ secrets.TFC_API_TOKEN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  apply:
    if: ${{ !startsWith(github.event.head_commit.message, 'bump:') }}
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: infra-apply-staging
      cancel-in-progress: false
    defaults:
      run:
        working-directory: iac
    env:
      TF_WORKSPACE: tadeumendonca-pwa-staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Init
        run: terraform init -input=false

      - name: Apply
        run: terraform apply -input=false -auto-approve -var-file=env/stg.tfvars
