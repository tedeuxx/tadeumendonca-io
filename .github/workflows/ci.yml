name: ci

# PR gate (/workflow/github-actions): lint + typecheck + tests (coverage ≥ 85%) + build + SonarCloud gate.
# Runs on EVERY PR to develop/main so the required `build-test` check always reports a status — a path
# filter (the "Detect code changes" step) skips the heavy steps for docs-only PRs, which still finish the
# job green. Without this, a required check + a trigger-level `paths:` filter leaves docs-only PRs BLOCKED
# forever (the check never runs). On push to develop/main (code paths only) it sets SonarCloud's baseline.
on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
    paths:
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vitest.config.ts"
      - "eslint.config.mjs"
      - "esbuild.config.mjs"
      - "sonar-project.properties"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Full history — SonarCloud uses git blame for accurate new-code / authorship attribution.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Does this change touch code/config, or is it docs-only? Docs-only PRs skip every step below but
      # the job still completes green, satisfying the required `build-test` check. (Free on public repos.)
      - name: Detect code changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            code:
              - 'src/**'
              - 'scripts/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vitest.config.ts'
              - 'eslint.config.mjs'
              - 'esbuild.config.mjs'
              - 'sonar-project.properties'
              - '.github/workflows/ci.yml'

      - name: Setup Node
        if: steps.changes.outputs.code == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        if: steps.changes.outputs.code == 'true'
        run: npm ci

      - name: Lint
        if: steps.changes.outputs.code == 'true'
        run: npm run lint

      - name: Typecheck
        if: steps.changes.outputs.code == 'true'
        run: npm run typecheck

      - name: Test (coverage ≥ 85%)
        if: steps.changes.outputs.code == 'true'
        run: npm test

      - name: Build
        if: steps.changes.outputs.code == 'true'
        run: npm run build

      # Authoritative quality gate: SAST + coverage + smells + duplication. Runs after tests so
      # coverage/lcov.info exists. `qualitygate.wait=true` polls SonarCloud and FAILS the job on a
      # red gate — this is the blocking gate (vitest ≥85% above is the fast local pre-check).
      # Requires CI-based analysis (SonarCloud Automatic Analysis must be OFF for this project).
      - name: SonarCloud scan (quality gate blocks)
        if: steps.changes.outputs.code == 'true'
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: -Dsonar.qualitygate.wait=true
