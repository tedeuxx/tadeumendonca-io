name: ci

# PR gate (/workflow/github-actions): lint + typecheck + tests (coverage ≥ 85%) + build + SonarCloud gate.
# Runs on PRs (gate + PR decoration) and on push to develop/main (sets SonarCloud's new-code baseline).
on:
  pull_request:
    branches: [develop, main]
    paths:
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "eslint.config.mjs"
      - "sonar-project.properties"
      - ".github/workflows/ci.yml"
  push:
    branches: [develop, main]
    paths:
      - "src/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "eslint.config.mjs"
      - "sonar-project.properties"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Full history — SonarCloud uses git blame for accurate new-code / authorship attribution.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (coverage ≥ 85%)
        run: npm test

      - name: Build
        run: npm run build

      # Authoritative quality gate: SAST + coverage + smells + duplication. Runs after tests so
      # coverage/lcov.info exists. `qualitygate.wait=true` polls SonarCloud and FAILS the job on a
      # red gate — this is the blocking gate (vitest ≥85% above is the fast local pre-check).
      # Requires CI-based analysis (SonarCloud Automatic Analysis must be OFF for this project).
      - name: SonarCloud scan (quality gate blocks)
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: -Dsonar.qualitygate.wait=true
