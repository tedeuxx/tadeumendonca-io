name: bff-deploy

# Deploy the BFF (Pattern B: code only) + republish the REST API contract.
# develop → staging (auto); main → production (gated by the production Environment). AWS via OIDC
# (AWS_BFF_OIDC_ROLE_ARN = the api/bff deploy role, least-privilege; trust repo:org/tadeumendonca-pwa:*).
# Monorepo Stage A: steps run in apps/bff (its own package-lock).
#
# Ordering caveat: when a single push changes BOTH iac/ and apps/bff/, this workflow and infra-apply
# run concurrently (cross-workflow `needs` isn't possible). The SSM config bus keeps it resilient — the
# deploy reads SSM and fails clearly if a param is missing. Convention: merge/apply infra before app
# changes (the cutover applies infra manually first).
#
# Regression policy (owner, 2026-06-16): post-deploy regression (newman) runs ONLY on main (production),
# NOT on develop/staging.
on:
  push:
    branches: [develop, main]
    paths:
      - "apps/bff/**"
      - "packages/shared/**"
      - ".github/workflows/bff-deploy.yml"

permissions:
  id-token: write # OIDC → AWS
  contents: read

concurrency:
  group: bff-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  AWS_REGION: us-east-1

jobs:
  deploy:
    # Skip the version-bump commit (it doesn't change code).
    if: ${{ !startsWith(github.event.head_commit.message, 'bump:') }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    defaults:
      run:
        working-directory: apps/bff
    env:
      ENV_NAME: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      SPA_ORIGIN: ${{ github.ref == 'refs/heads/main' && 'https://tadeumendonca.io' || 'https://staging.tadeumendonca.io' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/bff/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (esbuild → dist/index.mjs)
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BFF_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve config from SSM
        id: cfg
        run: |
          ssm() { aws ssm get-parameter --name "$1" --query 'Parameter.Value' --output text; }
          {
            echo "artifacts_bucket=$(ssm /$ENV_NAME/storage/artifacts-bucket-name)"
            echo "bff_name=$(ssm /$ENV_NAME/api/bff-function-name)"
            echo "api_id=$(ssm /$ENV_NAME/api/gateway-id)"
            echo "account=$(aws sts get-caller-identity --query Account --output text)"
            echo "cognito_pool_id=$(ssm /$ENV_NAME/auth/cognito-user-pool-id)"
            # digest function name is absent until the app infra is applied — resolve softly so the deploy
            # isn't ordering-coupled; the digest step skips when it's empty.
            echo "digest_name=$(ssm /$ENV_NAME/api/digest-function-name 2>/dev/null || echo '')"
          } >> "$GITHUB_OUTPUT"

      - name: Deploy BFF code (update-function-code)
        run: |
          ( cd dist && zip -q -r ../bff.zip . )
          aws s3 cp bff.zip "s3://${{ steps.cfg.outputs.artifacts_bucket }}/bff/latest.zip"
          aws lambda update-function-code \
            --function-name "${{ steps.cfg.outputs.bff_name }}" \
            --s3-bucket "${{ steps.cfg.outputs.artifacts_bucket }}" \
            --s3-key bff/latest.zip >/dev/null
          aws lambda wait function-updated --function-name "${{ steps.cfg.outputs.bff_name }}"

      - name: Deploy digest code (update-function-code)
        if: steps.cfg.outputs.digest_name != ''
        run: |
          ( cd dist-digest && zip -q -r ../digest.zip . )
          aws s3 cp digest.zip "s3://${{ steps.cfg.outputs.artifacts_bucket }}/digest/latest.zip"
          aws lambda update-function-code \
            --function-name "${{ steps.cfg.outputs.digest_name }}" \
            --s3-bucket "${{ steps.cfg.outputs.artifacts_bucket }}" \
            --s3-key digest/latest.zip >/dev/null
          aws lambda wait function-updated --function-name "${{ steps.cfg.outputs.digest_name }}"

      - name: Republish REST API contract (put-rest-api + deploy)
        env:
          INVOKE_ARN_BFF: arn:aws:apigateway:${{ env.AWS_REGION }}:lambda:path/2015-03-31/functions/arn:aws:lambda:${{ env.AWS_REGION }}:${{ steps.cfg.outputs.account }}:function:${{ steps.cfg.outputs.bff_name }}/invocations
          COGNITO_USER_POOL_ARN: arn:aws:cognito-idp:${{ env.AWS_REGION }}:${{ steps.cfg.outputs.account }}:userpool/${{ steps.cfg.outputs.cognito_pool_id }}
          API_VERSION: ${{ github.sha }}
          OPENAPI_OUT: openapi.aws.json
        run: |
          npx tsx scripts/build-openapi-aws.ts
          api_id="${{ steps.cfg.outputs.api_id }}"
          aws apigateway put-rest-api \
            --rest-api-id "$api_id" \
            --mode overwrite \
            --body "fileb://openapi.aws.json" >/dev/null
          # put-rest-api settles asynchronously — poll the total METHOD count until stable across two
          # reads, THEN create-deployment exactly once (account-wide rate-limited). See the api repo
          # history for why a fixed sleep / resource-count poll is insufficient.
          prev=-1
          for _ in $(seq 1 24); do
            sleep 5
            count="$(aws apigateway get-resources --rest-api-id "$api_id" --embed methods --limit 500 --output json | jq '[.items[].resourceMethods // {} | length] | add // 0')"
            echo "method graph: $count methods (prev $prev)"
            [ "$count" = "$prev" ] && break
            prev="$count"
          done
          aws apigateway create-deployment \
            --rest-api-id "$api_id" \
            --stage-name live --description "$API_VERSION" >/dev/null
          echo "deployed BFF + contract to $ENV_NAME"

      # Post-deploy regression (newman) — MAIN/production ONLY (owner policy). Production has no test
      # client, so the collection's authed admin writes self-skip; public smokes + contract checks run.
      - name: API smoke (newman) against production
        if: github.ref == 'refs/heads/main'
        run: |
          sleep 5 # let the new stage settle before black-box checks
          npm run "api-test:$ENV_NAME" -- --env-var "token="
