name: build-test

# PR gate for the site. lint + typecheck + tests (coverage ≥ 85%) + build + E2E + SonarCloud gate.
# trunk-single-env: main IS production, so there is no downstream tier to defer a check to — the full
# regression (Playwright E2E against a preview of the built app) runs HERE, before the merge deploys,
# not only post-deploy. Runs on EVERY PR to main so the required `build-test` check always reports a
# status; the dorny paths-filter skips the heavy steps when the change doesn't touch apps/fed — the job
# still finishes green, satisfying the required check. Steps run in apps/fed.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "apps/fed/**"
      - "packages/shared/**"
      - ".github/workflows/build-test.yml"

permissions:
  contents: read

concurrency:
  group: build-test-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/fed
    steps:
      - name: Checkout
        # Full history — SonarCloud uses git blame for accurate new-code / authorship attribution.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Does this change touch apps/fed (or packages/shared), or is it unrelated? Unrelated PRs skip
      # every step below but the job still completes green, satisfying the required `build-test` check.
      - name: Detect fed changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            code:
              - 'apps/fed/**'
              - 'packages/shared/**'
              - '.github/workflows/build-test.yml'

      - name: Setup Node
        if: steps.changes.outputs.code == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/fed/package-lock.json

      - name: Install
        if: steps.changes.outputs.code == 'true'
        run: npm ci

      # Package-vulnerability gate (ADR-0021). Blocks the PR on HIGH/CRITICAL advisories in PRODUCTION
      # deps (audit-ci.jsonc: skip-dev + high/critical); devDep advisories surface via Dependabot but
      # never block a static-site deploy. Placed right after Install so a vulnerable dep aborts BEFORE
      # the expensive E2E + Sonar. It queries a live advisory DB, so a new advisory can start blocking an
      # otherwise-unrelated code PR — the checked-in allowlist (justification + expiry) is the relief valve.
      - name: Audit (package vulnerabilities — high/critical prod deps block)
        if: steps.changes.outputs.code == 'true'
        run: npm run audit

      - name: Lint
        if: steps.changes.outputs.code == 'true'
        run: npm run lint

      - name: Typecheck
        if: steps.changes.outputs.code == 'true'
        run: npm run typecheck

      - name: Test (coverage ≥ 85%)
        if: steps.changes.outputs.code == 'true'
        run: npm test

      - name: Build
        if: steps.changes.outputs.code == 'true'
        run: npm run build

      # Full regression BEFORE the merge deploys. Playwright boots a `vite preview` of the build above
      # (webServer in playwright.config.ts) and runs the public journeys against it. Under
      # trunk-single-env this is the gate — a route break fails the PR instead of reaching production.
      - name: Install Playwright browser
        if: steps.changes.outputs.code == 'true'
        run: npx playwright install --with-deps chromium

      # `:built` skips the rebuild `e2e:local` does — the Build step above already produced dist/, and
      # a fresh checkout cannot have a stale one. Locally the default script rebuilds first, because
      # there dist/ CAN be stale and a suite run against old output passes for the wrong reason.
      - name: E2E (Playwright against a preview of the build)
        if: steps.changes.outputs.code == 'true'
        run: npm run e2e:local:built

      # Authoritative quality gate. projectBaseDir scopes the scan to apps/fed.
      # NOTE (owner/external): the SonarCloud project tedeuxx_tadeumendonca-fed must be rebound to the
      # tadeumendonca-io repo for PR decoration to work.
      # Skipped on Dependabot PRs: GitHub isolates Actions secrets from Dependabot-triggered runs, so
      # SONAR_TOKEN is empty there and the scan fails "not authorized" — blocking every dep bump for an
      # infrastructural reason, not a code one. A dep bump changes package.json/lock, not app source, so
      # Sonar's SAST/smells add little; the other gates (audit, lint, typecheck, test, build, E2E) still
      # run and gate the bump. Human PRs are unaffected.
      # Say which of the two greens this is. A path-filtered job that matched nothing reports PASS
      # exactly like one that ran every gate, and that ambiguity is the second half of issue #79 —
      # it is how "build-test is green" got read as assurance it never gave on a workflow-only PR.
      - name: Report what was verified
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ steps.changes.outputs.code }}" != "true" ]; then
            echo "::notice::no apps/fed changes — lint, typecheck, tests, build, E2E and Sonar did NOT run (nothing was verified)"
          else
            echo "::notice::full gate ran — lint, typecheck, tests (coverage ≥85%), build, E2E, SonarCloud"
          fi

      - name: SonarCloud scan (quality gate blocks)
        if: steps.changes.outputs.code == 'true' && github.actor != 'dependabot[bot]'
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: apps/fed
          args: -Dsonar.qualitygate.wait=true
