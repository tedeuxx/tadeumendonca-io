name: infra-plan

# PR gate for iac/ (APP infra). checkov → fmt → init → validate → plan → comment.
# Trunk-based: a PR into main plans the single workspace. TFC is the state backend (Local execution —
# GitHub runs the plan); AWS via OIDC. Workspace: tadeumendonca-io (tag-based, execution Local).
#
# Runs on EVERY PR to main so the required `infra-plan` check always reports a status; the dorny
# paths-filter skips the heavy steps (checkov/terraform) when the change doesn't touch iac/ — the job
# still completes green, so requiring it does not deadlock fed-only or docs-only PRs.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write # OIDC → AWS (plan refreshes data sources / state)

concurrency:
  group: infra-plan-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_TOKEN_app_terraform_io: ${{ secrets.TFC_API_TOKEN }}
  # Single environment (trunk-based): always the one workspace + tfvars.
  TF_WORKSPACE: tadeumendonca-io
  VAR_FILE: env/stg.tfvars
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  plan:
    runs-on: ubuntu-latest
    # The `staging` GitHub Environment only scopes AWS_INFRA_OIDC_ROLE_ARN (an environment secret) — it
    # has no required reviewers, so it is not an approval gate.
    environment: staging
    defaults:
      run:
        working-directory: iac
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      # Gate the heavy steps: only plan when iac/ (or this workflow) actually changed. On other PRs the
      # job still runs and reports green, so the required check never deadlocks.
      - name: Detect iac changes
        id: changes
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        with:
          filters: |
            iac:
              - 'iac/**'
              - '.github/workflows/infra-plan.yml'

      # Static analysis — hard-fail gate. Suppressions curated in iac/.checkov.yaml + inline #checkov:skip.
      - name: Checkov
        if: steps.changes.outputs.iac == 'true'
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12
        with:
          directory: iac/
          framework: terraform
          config_file: iac/.checkov.yaml
          soft_fail: false
          output_format: cli

      - name: Configure AWS credentials (OIDC)
        if: steps.changes.outputs.iac == 'true'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_INFRA_OIDC_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        if: steps.changes.outputs.iac == 'true'
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "1.9.8"

      - name: Format check
        if: steps.changes.outputs.iac == 'true'
        run: terraform fmt -check -recursive

      - name: Init
        if: steps.changes.outputs.iac == 'true'
        run: terraform init -input=false

      - name: Validate
        if: steps.changes.outputs.iac == 'true'
        run: terraform validate -no-color

      # tee to a file (pipefail preserves terraform's exit code → steps.plan.outcome). The comment step
      # reads this file instead of an env var: a large plan (e.g. a 100+-resource destroy) overflows the
      # execve arg+env limit and the github-script node process fails to start with "Argument list too
      # long" BEFORE it can truncate. Reading from a file keeps the value out of the process environment.
      - name: Plan
        id: plan
        if: steps.changes.outputs.iac == 'true'
        shell: bash
        run: |
          set -o pipefail
          terraform plan -input=false -no-color -var-file="$VAR_FILE" 2>&1 | tee plan.txt

      - name: Comment plan on PR
        if: always() && steps.changes.outputs.iac == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          WORKSPACE: ${{ env.TF_WORKSPACE }}
        with:
          script: |
            const fs = require("fs");
            const max = 60000;
            const planPath = "iac/plan.txt";
            let plan = fs.existsSync(planPath) ? fs.readFileSync(planPath, "utf8") : "(no plan output)";
            if (plan.length > max) plan = plan.slice(0, max) + "\n...(truncated — see the Actions log)";
            const body = [
              `### Terraform Plan — \`${process.env.WORKSPACE}\``,
              `Status: \`${{ steps.plan.outcome }}\``,
              "```hcl",
              plan,
              "```",
            ].join("\n");
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const marker = "### Terraform Plan — `" + process.env.WORKSPACE + "`";
            const existing = comments.find((c) => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

      - name: Fail if plan failed
        if: steps.changes.outputs.iac == 'true' && steps.plan.outcome == 'failure'
        run: exit 1
